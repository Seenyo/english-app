name: Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: verify (lint + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Validate Oracle deployment scripts
        run: bash -n ops/oracle/*.sh
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run security:client-boundary
      - name: Validate AI bridge URL
        env:
          VITE_AI_BRIDGE_URL: ${{ vars.VITE_AI_BRIDGE_URL }}
        run: npm run validate:ai-bridge-url
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_AI_BRIDGE_URL: ${{ vars.VITE_AI_BRIDGE_URL }}

  deploy:
    name: deploy to Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Validate AI bridge URL
        env:
          VITE_AI_BRIDGE_URL: ${{ vars.VITE_AI_BRIDGE_URL }}
        run: npm run validate:ai-bridge-url
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_AI_BRIDGE_URL: ${{ vars.VITE_AI_BRIDGE_URL }}
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist
      - id: deploy
        uses: actions/deploy-pages@v5
